<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy 20th Birthday Kiyak!!</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #2d0b59, #4b1d8f);
      color: white;
      overflow-x: hidden;
      text-align: center;
    }

    h1 {
      font-size: 3em;
      margin-top: 30px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px gold; }
      to { text-shadow: 0 0 30px white, 0 0 50px gold; }
    }

    .message {
      font-size: 1.2em;
      margin-bottom: 20px;
    }

    /* CAKE */
    .cake {
      position: relative;
      margin: 50px auto;
      width: 150px;
      height: 150px;
    }

    .layer {
      position: absolute;
      width: 100%;
      height: 50px;
      background: pink;
      border-radius: 10px;
    }

    .layer:nth-child(1) { bottom: 0; }
    .layer:nth-child(2) { bottom: 50px; background: #ffb6c1; }
    .layer:nth-child(3) { bottom: 100px; background: #ffc0cb; }

    .candle {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 40px;
      background: gold;
      cursor: pointer;
    }

    .flame {
      width: 10px;
      height: 15px;
      background: orange;
      border-radius: 50%;
      position: absolute;
      top: -15px;
      animation: flicker 0.3s infinite;
    }

    @keyframes flicker {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .hidden { display: none; }

    /* SLIDESHOW */
    .slideshow {
      width: 90%;
      max-width: 400px;
      margin: auto;
      position: relative;
    }

    .slide {
      display: none;
      width: 100%;
      border-radius: 10px;
    }

    /* BUTTON */
    button {
      margin: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: gold;
      cursor: pointer;
    }

    /* CONFETTI */
    .confetti {
      position: fixed;
      width: 8px;
      height: 8px;
      animation: fall 3s linear infinite;
    }

    @keyframes fall {
      from { transform: translateY(-10vh); }
      to { transform: translateY(100vh); }
    }

    /* LANTERN IMAGE */
    .lantern {
      position: absolute;
      width: 40px;
      animation: floatUp 12s linear infinite;
    }

    @keyframes floatUp {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }

  </style>
</head>
<body>

<h1>Happy Birthday, Sayangg 💜</h1>
<p class="message">Semoga aku selalu ada disemua ulang tahun kamu selanjutnya ✨</p>

<div class="cake">
  <div class="layer"></div>
  <div class="layer"></div>
  <div class="layer"></div>
  <div class="candle" onclick="blowCandle()">
    <div id="flame" class="flame"></div>
  </div>
</div>

<button onclick="playMusic()">Play Music 🎵</button>
<audio id="music" src="https://www.bensound.com/bensound-music/bensound-love.mp3"></audio>

<!-- SLIDESHOW -->
<div class="slideshow">
  <img class="slide" src="https://via.placeholder.com/400x300?text=Photo+1">
  <img class="slide" src="https://via.placeholder.com/400x300?text=Photo+2">
  <img class="slide" src="https://via.placeholder.com/400x300?text=Photo+3">
</div>

<script>
let blown = false;
let slideIndex = 0;

function blowCandle() {
  if (!blown) {
    document.getElementById('flame').classList.add('hidden');
    showConfetti();
    document.querySelector('.message').innerText = 'I love you 💜';
    fadeMusic();
    blown = true;
  }
}

function playMusic() {
  let music = document.getElementById('music');
  music.volume = 0;
  music.play();
  let fade = setInterval(() => {
    if (music.volume < 1) music.volume += 0.05;
    else clearInterval(fade);
  }, 200);
}

function fadeMusic() {
  let music = document.getElementById('music');
  let fade = setInterval(() => {
    if (music.volume > 0) music.volume -= 0.05;
    else clearInterval(fade);
  }, 200);
}

function showConfetti() {
  let colors = ['red','yellow','blue','green','purple'];
  for (let i = 0; i < 50; i++) {
    let conf = document.createElement('div');
    conf.className = 'confetti';
    conf.style.left = Math.random() * 100 + 'vw';
    conf.style.background = colors[Math.floor(Math.random()*colors.length)];
    document.body.appendChild(conf);
  }
}

function showSlides() {
  let slides = document.getElementsByClassName('slide');
  for (let i = 0; i < slides.length; i++) {
    slides[i].style.display = 'none';
  }
  slideIndex++;
  if (slideIndex > slides.length) slideIndex = 1;
  slides[slideIndex-1].style.display = 'block';
  setTimeout(showSlides, 3000);
}
showSlides();

function createLantern() {
  let lantern = document.createElement('img');
  lantern.src = 'https://i.imgur.com/7yUvePI.png';
  lantern.className = 'lantern';
  lantern.style.left = Math.random() * 100 + 'vw';
  document.body.appendChild(lantern);
  setTimeout(() => lantern.remove(), 12000);
}
setInterval(createLantern, 2000);
</script>

</body>
</html>
