<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background lantern -->
  <div class="lanterns"></div>

  <div class="container">
    <h1 id="title">Happy Birthday</h1>
    <h2 id="name">For You 💜</h2>
    <p id="message">Semoga semua impianmu menjadi nyata ✨</p>

    <!-- Cake -->
    <div class="cake">
      <div class="candle" onclick="blowCandle(this)">
        <div class="flame"></div>
      </div>
      <div class="candle" onclick="blowCandle(this)">
        <div class="flame"></div>
      </div>
      <div class="candle" onclick="blowCandle(this)">
        <div class="flame"></div>
      </div>
    </div>

    <button onclick="toggleMusic()">🎵 Music</button>
  </div>

  <!-- Audio -->
  <audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mp3">
  </audio>

  <canvas id="confetti"></canvas>

  <script src="script.js"></script>
</body>
</html>
