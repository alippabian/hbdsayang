<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Magic</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background -->
  <div class="background"></div>

  <!-- Lanterns -->
  <div class="lantern-container"></div>

  <div class="container">
    <h1 class="title">Happy Birthday ✨</h1>
    <h2 class="name">For You 💜</h2>
    <p class="message">Make a wish under the floating lights...</p>

    <!-- 3D Cake -->
    <div class="cake">
      <div class="layer bottom"></div>
      <div class="layer middle"></div>
      <div class="layer top"></div>

      <!-- Candles -->
      <div class="candles">
        <div class="candle" onclick="blow(this)"><div class="flame"></div></div>
        <div class="candle" onclick="blow(this)"><div class="flame"></div></div>
        <div class="candle" onclick="blow(this)"><div class="flame"></div></div>
      </div>
    </div>
  </div>

  <!-- Music autoplay -->
  <audio autoplay loop>
    <source src="https://files.catbox.moe/6r2n6v.mp3" type="audio/mp3">
  </audio>

  <canvas id="confetti"></canvas>

  <script src="script.js"></script>
</body>
</html>
