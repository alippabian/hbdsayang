<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>welcome to ur 20s kiya</title>

<!-- 🌸 GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow-x: hidden;
  font-family: 'Poppins', sans-serif;
  color: white;
  background: #2b0a3d;
}

/* 🌌 SKY CINEMATIC */
.sky {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -5;
  background:
    radial-gradient(circle at 50% 30%, rgba(255,200,100,0.15), transparent 40%),
    radial-gradient(circle at 20% 80%, rgba(255,150,50,0.1), transparent 50%),
    linear-gradient(180deg, #2b0a3d 0%, #5a189a 50%, #240046 100%);
}

.sky::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 50% 60%, rgba(255,200,100,0.08), transparent 60%);
}

/* ✨ STARS */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.7;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from {opacity: 0.2;}
  to {opacity: 1;}
}

/* 🏮 LANTERN */
.lantern {
  position: absolute;
  width: 18px;
  height: 28px;
  background: linear-gradient(#ffd166, #ffb703);
  border-radius: 5px;
  box-shadow: 0 0 20px rgba(255, 200, 0, 0.8);
  animation: float linear infinite;
}

.lantern.far {
  transform: scale(0.6);
  opacity: 0.4;
  filter: blur(1px);
}

.lantern.mid {
  transform: scale(0.9);
  opacity: 0.7;
}

.lantern.near {
  transform: scale(1.3);
  opacity: 1;
  box-shadow: 0 0 35px rgba(255, 200, 0, 1);
}

@keyframes float {
  0% {transform: translateY(100vh) translateX(0);}
  50% {transform: translateY(50vh) translateX(40px);}
  100% {transform: translateY(-120vh) translateX(-40px);}
}

/* 🎬 INTRO */
.intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2rem;
  animation: introFade 4s forwards;
  z-index: 10;
}

@keyframes introFade {
  0% {opacity: 1;}
  80% {opacity: 1;}
  100% {opacity: 0; visibility: hidden;}
}

/* 📝 TEXT */
.container {
  text-align: center;
  margin-top: 15vh;
}

.title {
  font-family: 'Playfair Display', serif;
  font-size: 3.2rem;
  text-shadow: 0 0 15px rgba(255,215,0,0.5);
}

.name {
  font-family: 'Playfair Display', serif;
  color: gold;
  font-size: 1.5rem;
}

.container p {
  font-weight: 300;
}

/* 🎂 CAKE */
.cake {
  margin: 60px auto;
  width: 220px;
  perspective: 800px;
}

.layer {
  height: 60px;
  border-radius: 15px;
  margin-top: -20px;
  transform: rotateX(20deg);
  box-shadow: 0 20px 30px rgba(0,0,0,0.4),
              inset 0 -10px rgba(0,0,0,0.2);
}

.bottom { background: linear-gradient(#ff4d6d, #c9184a); }
.middle { width: 180px; margin-left: 20px; background: linear-gradient(#ffd6a5, #ffadad); }
.top { width: 140px; margin-left: 40px; background: linear-gradient(#cdb4db, #7b2cbf); }

/* 🕯 CANDLE */
.candles {
  display: flex;
  justify-content: center;
  gap: 20px;
}

.candle {
  width: 10px;
  height: 40px;
  background: white;
  position: relative;
  cursor: pointer;
}

.flame {
  width: 10px;
  height: 18px;
  background: radial-gradient(circle, yellow, orange, red);
  border-radius: 50%;
  position: absolute;
  top: -18px;
  animation: flicker 0.12s infinite;
  box-shadow: 0 0 20px orange;
}

@keyframes flicker {
  0% {transform: scale(1);}
  50% {transform: scale(1.3);}
  100% {transform: scale(1);}
}

/* 📸 FOTO */
.side-gallery {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  z-index: 2;
}

.left { left: 8%; }
.right { right: 8%; }

.polaroid {
  background: white;
  padding: 10px 10px 25px;
  width: 160px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.5);
  border-radius: 6px;
  transform: rotate(-6deg);
}

.right .polaroid { transform: rotate(6deg); }

.polaroid img { width: 100%; }

.polaroid p {
  font-family: 'Dancing Script', cursive;
  font-size: 16px;
  color: #333;
  text-align: center;
}

/* ✨ MAGIC */
.magic {
  position: fixed;
  width: 100%;
  top: 40%;
  text-align: center;
  font-size: 2rem;
  opacity: 0;
  transition: 1s;
}

/* 🖼️ TAMBAHAN PNG SUDUT */
.corner-img {
  position: fixed;
  bottom: 0;
  width: 140px;
  z-index: 1;
  opacity: 0.95;
  pointer-events: none;
  animation: floatSoft 4s ease-in-out infinite;
}

.corner-left { left: 0; }
.corner-right { right: 0; }

@keyframes floatSoft {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

/* 📱 MOBILE */
@media (max-width: 768px) {
  .corner-img {
    width: 90px;
  }
}
</style>
</head>

<body>

<div class="intro">✨Zazkia Qurrata'aini Apriliasari✨</div>
<div class="sky"></div>

<div class="container">
  <h1 class="title">✨Happy 20th Birthday Sayangg🥳</h1>
  <h2 class="name">Hope this year brings u more happiness💙</h2>
  <p>Make a wishh!🏮🏮</p>

  <div class="cake">
    <div class="candles">
      <div class="candle" onclick="blow(this)"><div class="flame"></div></div>
      <div class="candle" onclick="blow(this)"><div class="flame"></div></div>
      <div class="candle" onclick="blow(this)"><div class="flame"></div></div>
    </div>

    <div class="layer top"></div>
    <div class="layer middle"></div>
    <div class="layer bottom"></div>
  </div>
</div>

<div class="side-gallery left">
  <div class="polaroid">
    <img src="foto1.jpeg">
    <p>Our Moment 💜</p>
  </div>
</div>

<div class="side-gallery right">
  <div class="polaroid">
    <img src="foto2.jpeg">
    <p>Beautiful Memory ✨</p>
  </div>
</div>

<!-- 🖼️ TAMBAHAN BARU (PNG SUDUT) -->
<img src="foto3.png" class="corner-img corner-left">
<img src="foto4.png" class="corner-img corner-right">

<div class="magic" id="magicText">mi lovv yuu forever n always🧏🏻‍♂️🫰🏻💙🌟</div>

<audio id="music" autoplay loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<script>
for (let i = 0; i < 80; i++) {
  let s = document.createElement("div");
  s.className = "star";
  s.style.left = Math.random()*100 + "vw";
  s.style.top = Math.random()*100 + "vh";
  document.body.appendChild(s);
}

for (let i = 0; i < 40; i++) {
  let l = document.createElement("div");
  let type = Math.random();
  l.className = type < 0.3 ? "lantern far" : type < 0.7 ? "lantern mid" : "lantern near";
  l.style.left = Math.random()*100 + "vw";
  l.style.animationDuration = (8 + Math.random()*10) + "s";
  document.body.appendChild(l);
}

let count = 0;
function blow(el) {
  let f = el.querySelector(".flame");
  if (f) {
    f.remove();
    count++;
  }
  if (count === 3) {
    document.getElementById("magicText").style.opacity = 1;
  }
}

document.addEventListener("click", () => {
  document.getElementById("music").play();
}, { once: true });
</script>

</body>
</html>
