<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #2d0b59, #4b1d8f);
      color: white;
      overflow-x: hidden;
    }

    h1 {
      text-align: center;
      font-size: 3em;
      margin-top: 40px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #ffd700; }
      to { text-shadow: 0 0 25px #fff, 0 0 40px #ffd700; }
    }

    .cake {
      text-align: center;
      margin-top: 50px;
    }

    .candle {
      width: 10px;
      height: 40px;
      background: gold;
      margin: 0 auto;
      position: relative;
      cursor: pointer;
    }

    .flame {
      width: 10px;
      height: 15px;
      background: orange;
      border-radius: 50%;
      position: absolute;
      top: -15px;
      animation: flicker 0.3s infinite;
    }

    @keyframes flicker {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .hidden { display: none; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
      transition: transform 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.1);
    }

    .lantern {
      position: absolute;
      width: 20px;
      height: 30px;
      background: gold;
      border-radius: 50%;
      animation: floatUp 10s linear infinite;
    }

    @keyframes floatUp {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      background: red;
      animation: fall 3s linear infinite;
    }

    @keyframes fall {
      from { transform: translateY(-10vh); }
      to { transform: translateY(100vh); }
    }

    button {
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: gold;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Happy Birthday 🎂</h1>

<div class="cake">
  <div class="candle" onclick="blowCandle()">
    <div id="flame" class="flame"></div>
  </div>
  <p>Click the candle to blow it!</p>
</div>

<button onclick="playMusic()">Play Music 🎵</button>
<audio id="music" src="https://www.bensound.com/bensound-music/bensound-love.mp3"></audio>

<div class="gallery">
  <img src="https://via.placeholder.com/300" />
  <img src="https://via.placeholder.com/300" />
  <img src="https://via.placeholder.com/300" />
</div>

<script>
let blown = false;

function blowCandle() {
  if (!blown) {
    document.getElementById('flame').classList.add('hidden');
    showConfetti();
    alert('Make a wish 💜');
    blown = true;
  }
}

function playMusic() {
  document.getElementById('music').play();
}

function showConfetti() {
  for (let i = 0; i < 30; i++) {
    let conf = document.createElement('div');
    conf.className = 'confetti';
    conf.style.left = Math.random() * 100 + 'vw';
    document.body.appendChild(conf);
  }
}

function createLantern() {
  let lantern = document.createElement('div');
  lantern.className = 'lantern';
  lantern.style.left = Math.random() * 100 + 'vw';
  document.body.appendChild(lantern);

  setTimeout(() => lantern.remove(), 10000);
}

setInterval(createLantern, 2000);
</script>

</body>
</html>
