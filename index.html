<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Magic</title>

<style>
/* ===== BODY ===== */
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  color: white;
}

/* ===== BACKGROUND (TANGLED VIBE) ===== */
.background {
  position: fixed;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,215,0,0.15), transparent),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.1), transparent),
    linear-gradient(180deg, #14021f, #3c096c);
  z-index: -2;
}

/* ===== LANTERN ===== */
.lantern {
  position: absolute;
  width: 20px;
  height: 30px;
  background: linear-gradient(#ffd166, #ffb703);
  border-radius: 5px;
  box-shadow: 0 0 20px rgba(255, 200, 0, 0.8);
  animation: float linear infinite;
}

.lantern::after {
  content: "";
  position: absolute;
  bottom: -5px;
  left: 50%;
  width: 2px;
  height: 8px;
  background: #333;
  transform: translateX(-50%);
}

@keyframes float {
  0% {transform: translateY(100vh) translateX(0);}
  50% {transform: translateY(50vh) translateX(40px);}
  100% {transform: translateY(-120vh) translateX(-40px);}
}

/* ===== TEXT ===== */
.container {
  text-align: center;
  margin-top: 12vh;
}

.title {
  font-size: 3rem;
  animation: fade 2s ease;
}

.name {
  color: gold;
}

@keyframes fade {
  from {opacity: 0; transform: translateY(-20px);}
  to {opacity: 1;}
}

/* ===== 3D CAKE ===== */
.cake {
  position: relative;
  margin: 50px auto;
  width: 220px;
}

.layer {
  height: 60px;
  border-radius: 15px;
  margin-top: -20px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3),
              inset 0 -10px rgba(0,0,0,0.2);
}

.bottom { background: linear-gradient(#ff4d6d, #c9184a); }
.middle { width: 180px; margin-left: 20px; background: linear-gradient(#ffd6a5, #ffadad); }
.top { width: 140px; margin-left: 40px; background: linear-gradient(#cdb4db, #7b2cbf); }

/* ===== CANDLE ===== */
.candles {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: -20px;
}

.candle {
  width: 12px;
  height: 40px;
  background: repeating-linear-gradient(45deg, white, pink 5px);
  position: relative;
  cursor: pointer;
}

.flame {
  width: 12px;
  height: 18px;
  background: radial-gradient(circle, yellow, orange, red);
  border-radius: 50%;
  position: absolute;
  top: -18px;
  animation: flicker 0.15s infinite;
  box-shadow: 0 0 15px orange;
}

@keyframes flicker {
  0% {transform: scale(1);}
  50% {transform: scale(1.2);}
  100% {transform: scale(1);}
}
</style>
</head>

<body>

<div class="background"></div>

<div class="container">
  <h1 class="title">Happy Birthday ✨</h1>
  <h2 class="name">For You 💜</h2>
  <p>Make a wish under the floating lights...</p>

  <div class="cake">
    <div class="candles">
      <div class="candle" onclick="blow(this)"><div class="flame"></div></div>
      <div class="candle" onclick="blow(this)"><div class="flame"></div></div>
      <div class="candle" onclick="blow(this)"><div class="flame"></div></div>
    </div>

    <div class="layer top"></div>
    <div class="layer middle"></div>
    <div class="layer bottom"></div>
  </div>
</div>

<audio id="music" autoplay loop>
  <source src="https://files.catbox.moe/6r2n6v.mp3" type="audio/mp3">
</audio>

<script>
/* ===== LANTERN GENERATOR (NO IMAGE ERROR) ===== */
for (let i = 0; i < 40; i++) {
  let lantern = document.createElement("div");
  lantern.className = "lantern";

  lantern.style.left = Math.random() * 100 + "vw";
  lantern.style.animationDuration = (8 + Math.random() * 10) + "s";
  lantern.style.opacity = Math.random();

  document.body.appendChild(lantern);
}

/* ===== CANDLE ===== */
let count = 0;
function blow(el) {
  let flame = el.querySelector(".flame");
  if (flame) {
    flame.remove();
    count++;
  }

  if (count === 3) {
    alert("✨ Your wish is on its way...");
  }
}

/* ===== AUTOPLAY FIX (BROWSER ISSUE) ===== */
document.body.addEventListener("click", () => {
  document.getElementById("music").play();
});
</script>

</body>
</html>
